services:
  - type: web
    name: roland-garros-bracket-challenge
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
    disk:
      name: bracket-state
      mountPath: /var/data
      sizeGB: 1
